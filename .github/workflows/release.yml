name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create (for example, v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p build dist
          name="youtube-transcript-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            name="${name}.exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "build/${name}" ./youtube-transcript.go

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd build && zip "../dist/youtube-transcript-${GOOS}-${GOARCH}.zip" "${name}")
          else
            (cd build && tar -czf "../dist/youtube-transcript-${GOOS}-${GOARCH}.tar.gz" "${name}")
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-transcript-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag_name || github.ref_name, '-') }}
